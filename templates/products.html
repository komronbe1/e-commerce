{% extends 'base.html' %}

{% block content %}
<h2>Products</h2>

{% for product in products %}
<div class="card">
    <h3>{{ product.name }}</h3>
    <p>Price: {{ product.price }}</p>

    <form method="post" action="/order/create/">
        {% csrf_token %}
        <input type="hidden" name="product_id" value="{{ product.id }}">
        <button type="submit">Buy</button>
    </form>
</div>
{% endfor %}

{% endblock %}
