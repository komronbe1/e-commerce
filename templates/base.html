<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>E-Commerce</title>
    <style>
        body { font-family: Arial; margin: 0; background: #f5f5f5; }
        nav { background: #222; color: white; padding: 15px; }
        nav a { color: white; margin-right: 15px; text-decoration: none; }
        .container { padding: 20px; }
        .card {
            background: white;
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
            display: inline-block;
            width: 200px;
        }
        button {
            background: green;
            color: white;
            padding: 8px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<nav>
    <a href="/">Home</a>
    <a href="/orders/">Orders</a>
    <a href="/stats/">Stats</a>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
